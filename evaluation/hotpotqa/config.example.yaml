# HotpotQA Evaluation Configuration

# Model settings
model:
  model_id: "Qwen/Qwen3-4B-Instruct-2507"
  openai_config: {
    "api_key":"your api-key here",
    "base_url":"the base url here",
    "model":"gpt-4o-mini"
  }

  model_context_window: 32768
  attn_implementation: "sdpa"
  device_map: "auto"
  quantization_config: null

# Memory settings
memory:
  storage_mode: "kv_cache"  # "kv_cache" or "text" - choose storage backend
  clean_cache_first: true  # Set to true to avoid loading corrupted cache and ensure clean start
  router_system_prompt: null
  overlap_ratio: 0.025 # Overlap ratio between KV blocks (0.0-1.0)
  overlap_mode: "token"  # "chunk" or "token" - overlap handling strategy
  block_size_ratio: 0.125
  max_concurrent_gpu_operations: 2  # Number of concurrent GPU operations for parallel queries
  max_memory_segments: 5  # Maximum number of memory segments to return in query response
  max_blocks: 5  # Maximum number of memory blocks to select by the router
  
  # Resource control for batch inference
  # Adjust these based on your GPU memory:
  # - Single GPU (24GB): query_batch_size=2, max_parallel_cache_loads=4
  # - Multi-GPU (4x24GB): query_batch_size=4-8, max_parallel_cache_loads=8
  # - High-end (8xA100): query_batch_size=8-16, max_parallel_cache_loads=16
  query_batch_size: 4  # Batch queries together for true GPU parallelism
  max_parallel_cache_loads: 8  # Maximum parallel KV cache loads to GPU

# HotpotQA Evaluation settings
hotpotqa_eval:
  dataset_path: "evaluation/eval_data/hotpotqa/eval_50.json"
  output_dir: "evaluation/hotpotqa/results"
  ratio: 1.0  # Portion of dataset to evaluate (0.0-1.0)
  max_tokens_per_chunk: 2048  # Maximum tokens per context chunk

# Logging
logging:
  log_dir: "evaluation/hotpotqa/logs"
  log_level: "INFO"
