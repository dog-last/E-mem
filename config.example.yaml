# Evaluation Configuration

# Model settings
model:
  model_id: "Qwen/Qwen3-4B"
  openai_config: {
    "api_key":"your api-key here",
    "base_url":"the base url here",
    "model":"gpt-4o-mini"
  }

  model_context_window: 32768
  attn_implementation: "sdpa"
  device_map: "auto"
  quantization_config: null

# Memory settings
memory:
  storage_mode: "kv_cache"  # "kv_cache" or "text" - choose storage backend
  clean_cache_first: true  # Set to true to avoid loading corrupted cache
  router_system_prompt: null
  overlap_ratio: 0.1  # Overlap ratio between KV blocks (0.0-1.0)
  overlap_mode: "chunk"  # "chunk" or "token" - overlap handling strategy
  block_size_ratio: 0.125  # Block size ratio relative to model context window (0.0-1.0)
  max_concurrent_gpu_operations: 2  # Number of concurrent GPU operations for parallel queries
  max_memory_segments: 5  # Maximum number of memory segments to return in query response
  max_blocks: 5  # Maximum number of memory blocks to select by the router
  
  # Resource control for different hardware configurations
  # Adjust these based on your GPU memory:
  # - Single GPU (24GB): query_batch_size=1-2, max_parallel_cache_loads=2
  # - Multi-GPU (4x24GB): query_batch_size=4-8, max_parallel_cache_loads=8
  # - High-end (8xA100): query_batch_size=8-16, max_parallel_cache_loads=16
  query_batch_size: 2  # Number of queries to batch together for true GPU parallelism
  max_parallel_cache_loads: 4  # Maximum parallel KV cache loads to GPU
  kv_cache_on_gpu: false  # Keep inactive KV caches on GPU (only for high-memory setups)
  enable_router: true  # Set to false to query ALL blocks without routing (for evaluation)
  
  # Router type: "hybrid" (recommended) or "llm" (legacy LLM-based routing)
  router_type: "hybrid"
  
  # Hybrid router configuration (only used when router_type="hybrid")
  hybrid_router:
    # Embedding model settings
    # Provider: "huggingface" (local) or "openai" (API-based)
    embedding_provider: "huggingface"
    # Model name (default: sentence-transformers/all-MiniLM-L6-v2 for HuggingFace)
    embedding_model: null
    # Additional embedding config (e.g., api_key, base_url for OpenAI)
    embedding_config: null
    
    # Scoring weights (will be normalized to sum to 1.0)
    summary_weight: 0.3    # Weight for summary embedding similarity
    text_weight: 0.4       # Weight for text chunk embedding similarity  
    bm25_weight: 0.3       # Weight for BM25 keyword matching
    
    # Top-k settings for each scoring component
    summary_top_k: 10      # Top-k summaries to consider
    text_top_k: 20         # Top-k text chunks to consider
    bm25_top_k: 10         # Top-k BM25 results to consider
    
    # Text chunking settings for embedding
    text_chunk_size: 512   # Max chunk size in characters
    text_chunk_overlap: 50 # Overlap between chunks in characters
    
    # Fallback to LLM routing when embedding fails
    use_llm_fallback: false
    
    # BM25 tokenizer: use jieba for Chinese text support
    # Set to false if your corpus is English-only
    bm25_use_jieba: true
    
    # BM25 boost threshold: auto-select blocks with high keyword match
    # If a block's normalized BM25 score exceeds this threshold (0-1),
    # it will be selected regardless of combined score.
    # Set to null to disable. Recommended: 0.7-0.9 for strict keyword matching.
    bm25_boost_threshold: 0.8  # e.g., 0.8

# LoComo Evaluation settings
locomo_eval:
  dataset_path: "evaluation/eval_data/locomo/locomo10.json"
  output_dir: "evaluation/locomo/results"
  ratio: 1.0  # Portion of dataset to evaluate (0.0-1.0)
  
  # Path to specific questions JSON file (optional)
  # If provided, only these questions will be evaluated
  # specific_questions_path: "evaluation/locomo/eval_data/specific_questions.json"
  
  # Auto-save settings for conversations
  # QA questions NEVER use auto_save, this one is used for conversation turns
  conversation_auto_save: True  # Set to true to enable auto-save for conversation turns
  
  # Categories to evaluate (1-5)
  categories: [1,2,3,4,5]

# Add other evaluation benchmarks here
# example_eval:
#   dataset_path: "evaluation/example/data.json"
#   output_dir: "evaluation/example/results"
#   ratio: 1.0

# Logging
logging:
  log_dir: "evaluation/locomo/logs"
  log_level: "INFO"